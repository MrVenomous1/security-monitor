version: "3.8"

services:
  tikg-api:
    build:
      context: ./tikg_api
      dockerfile: Dockerfile
      network: host
    container_name: tikg-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MODEL_NAME=${TIKG_MODEL:-secureBERT}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - tikg_models:/app/models
      - tikg_reports:/app/reports
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  netdata:
    image: netdata/netdata:latest
    container_name: netdata
    restart: unless-stopped
    pid: host
    network_mode: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdata_config:/etc/netdata
      - netdata_lib:/var/lib/netdata
      - netdata_cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./netdata/collectors:/etc/netdata/custom-plugins.d:ro
      - ./netdata/health:/etc/netdata/health.d/threat-intel.conf:ro
    environment:
      - NETDATA_CLAIM_TOKEN=${NETDATA_CLAIM_TOKEN:-}
      - NETDATA_CLAIM_URL=${NETDATA_CLAIM_URL:-}
      - NETDATA_CLAIM_ROOMS=${NETDATA_CLAIM_ROOMS:-}
      - TIKG_API_URL=http://localhost:5000

volumes:
  tikg_models:
  tikg_reports:
  netdata_config:
  netdata_lib:
  netdata_cache:

networks:
  monitor-net:
    driver: bridgeversion: "3.8"

